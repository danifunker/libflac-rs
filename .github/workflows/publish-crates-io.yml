name: Publish to crates.io

# This crate publishes as pure Rust: the whole repository is pure Rust (no build
# script, no C, no dependencies — the differential oracle is restored on demand from
# the `c-oracle` tag, see ORACLE.md), so the normal `cargo publish` verification build
# pulls in nothing. The slim-tarball check below stays as a defensive guard.
#
# Flow: tag the release (vX.Y.Z, matching Cargo.toml), then dispatch this workflow
# with that tag (dry_run first, then for real). Requires the CARGO_REGISTRY_TOKEN
# repository secret.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (must already exist, e.g. v0.143.0)'
        required: true
      dry_run:
        description: 'Validate only — do not publish'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight (version matches tag, slim tarball)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify Cargo.toml version matches tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          tag="$INPUT_TAG"
          tag_no_v="${tag#v}"
          crate_version=$(grep -E '^version = ' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$tag_no_v" != "$crate_version" ]; then
            echo "::error::Tag $tag (=$tag_no_v) does not match Cargo.toml version $crate_version"
            exit 1
          fi
          echo "Tag and version agree: $tag_no_v"

      - name: Verify slim tarball contents
        run: |
          set -euo pipefail
          cargo package --locked --list > /tmp/package-files.txt
          echo "--- Files in tarball ---"
          cat /tmp/package-files.txt
          # Internal/dev files must never ship (enforced by [package.exclude]). In
          # particular the cref/ oracle (the vendored C) and build.rs stay out, so
          # the published crate is pure Rust.
          if grep -E '^(CLAUDE\.md|\.github/|cref/|build\.rs|target/)' /tmp/package-files.txt; then
            echo "::error::Internal files leaked into the package — check [package.exclude] in Cargo.toml."
            exit 1
          fi
          # Cap the tarball so a stray large file (the vendored C, target/, …) fails
          # the release; the real package is tens of KiB.
          cargo package --no-verify --locked
          size=$(stat -c%s target/package/libflac-rs-*.crate)
          echo "Tarball size: $size bytes"
          if [ "$size" -gt 524288 ]; then
            echo "::error::Tarball exceeds 512 KiB cap."
            exit 1
          fi

      - name: Upload tarball as artifact
        uses: actions/upload-artifact@v6
        with:
          name: crate-tarball
          path: target/package/libflac-rs-*.crate

  publish:
    name: cargo publish
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            cargo publish --dry-run --locked
          else
            cargo publish --locked
          fi
