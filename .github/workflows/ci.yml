name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # The pure-Rust library builds and its tests pass on every platform. There is no
  # C toolchain, build script, or dependency involved, so this also guards against
  # platform-specific regressions. The lossless round-trip tests (encode -> decode ->
  # PCM, MD5-verified, all depths/levels) live here; byte-exactness vs the C
  # reference is re-checked on demand via the documented oracle process (ORACLE.md).
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --locked --all-targets -- -D warnings
      - run: cargo doc --locked --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
